<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Parrillas El Gran Máximo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />  
  <link rel="stylesheet" href="../CSS/login.css">
 
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
    <span id="theme-icon">☀️</span>
  </button>

  <div class="container">
    <div class="logo-wrap">
      <img src="logo_new_parrillas_Mesa_de_trabajo_1.png" alt="Parrillas El Gran Máximo" />
    </div>

    <div class="card">
      <div class="card-title">Iniciar Sesión</div>
      <div class="card-sub">Bienvenido de vuelta 🔥</div>

      <div id="alerta" class="alert"></div>

      <div class="input-group">
        <label>Usuario</label>
        <input type="email" id="correo" placeholder="tucorreo@gmail.com" />
        <span class="input-icon">📧</span>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="contrasena" placeholder="••••••••" />
        <span class="input-icon">🔒</span>
      </div>

      <button class="btn-primary" id="btn-login" onclick="login()">ENTRAR</button>

      <div class="divider">
        <span></span>
        <p>¿No tienes cuenta?</p>
        <span></span>
      </div>

      <button class="btn-secondary" onclick="window.location.href='registro.html'">REGISTRARSE</button>
    </div>
  </div>

  <script src="../JS/login.js"></script>
 
</body>
</html>
